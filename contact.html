    <h1>wanna get in touch?</h1>
    <p>↓↓↓↓↓↓↓↓↓</p>
    <script>
        // Videos
        var videoSources = [
            "media/vid/main.mp4",
            "media/vid/edmobile.mp4",
            "media/vid/artius.mp4",
            "media/vid/edmesc.mp4"
        ];

        var currentIndex = 0;

        function changeVideo() {
            var video = document.getElementById("mainVideo");
            currentIndex = (currentIndex + 1) % videoSources.length;
            video.style.opacity = 0;
            // After 800ms, fadein
            setTimeout(function() {
                video.src = videoSources[currentIndex];
                video.load();
                video.play();
                video.style.opacity = 1;
            }, 800);
        }

        // Change video on a delay
        setInterval(changeVideo, 10000);
    </script>
