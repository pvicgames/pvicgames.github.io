<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PVic Games</title>

        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="container">
            <div class="game" id="main" >
                <video autoplay muted loop><source src="vid/main.mp4" type="video/mp4"></video>
                <img class="logo" src="img/logo.png" alt="Logotipo da Pvic Games">
                <p>"We make games"</p>
            </div>

            <div class="game" id="edmobile">
                <video autoplay muted loop><source src="vid/edmobile.mp4" type="video/mp4"></video>
                <br>
                <img class="logo" src="img/logo.png" alt="Logotipo da Pvic Games">
            </div>

            <div class="game" id="edmesc">
                <video autoplay muted loop><source src="vid/edmesc.mp4" type="video/mp4"></video>
                <img class="logo" src="img/logo.png" alt="Logotipo da Pvic Games">
            </div>
        </div>    
    </body>
</html>
